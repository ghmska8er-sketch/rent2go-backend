# Spring DataSource Configuration - Production
# Use environment variables for sensitive data
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Spring Data JPA Hibernate Configuration - Production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate

# Logging - Production
logging.level.root=WARN
logging.level.app.web.rtgtechnologies.rent2go=INFO

# Server Configuration
server.port=8080
server.compression.enabled=true
server.compression.min-response-size=1024

# CORS - Production Frontend
prod.frontend.url=${CORS_ALLOWED_ORIGINS:https://rent2go.com}

# Security - Production
authorization.jwt.secret=${JWT_SECRET}
