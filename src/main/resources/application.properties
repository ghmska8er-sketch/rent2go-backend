# Spring Application Name
spring.application.name=rent2go-backend

# Active Profile - Default to development if no profile is set
spring.profiles.active=dev

# Frontend URL used for CORS (development default)
frontend.url=http://localhost:4200
prod.frontend.url=https://rent2go.com
prod.backend.url=https://api.rent2go.com

# Spring DataSource Configuration - Default to local development
# Override via profiles (application-dev.properties, application-prod.properties) or environment variables
spring.datasource.url=jdbc:mysql://localhost:3306/rent2go_db?useSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring Data JPA Configuration
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=app.web.rtgtechnologies.rent2go.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Elements take their values from maven pom.xml build-related information
documentation.application.description=@project.description@
documentation.application.version=@project.version@

server.max-http-request-header-size=128KB
server.tomcat.max-http-header-size=131072

# Security Configuration
authorization.jwt.secret=SuperSecureRent2GoJwtSecretKeyForHS512AlgorithmWithMinimumRequiredBitsLengthAndMaximumSecurityCompliance2026
authorization.jwt.expiration.days=7

